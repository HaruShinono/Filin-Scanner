{% block scripts %}
<script>
    // Hàm gọi AI Remediation cho Nhóm Lớn
    async function triggerAiRemediation(groupId, firstVulnId) {
        const btn = document.getElementById(`btn-ai-${groupId}`);
        const contentArea = document.getElementById(`ai-content-${groupId}`);

        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> AI is analyzing the group...';
        btn.disabled = true;

        try {
            // Gọi API dựa trên ID của lỗ hổng đầu tiên trong nhóm làm đại diện
            const response = await fetch(`/api/remediate/${firstVulnId}`, { method: 'POST' });
            const result = await response.json();

            if (response.ok && result.status === 'success') {
                const data = result.data;
                const safeFixedCode = escapeHtml(data.fixed_code);
                const safeExplanation = escapeHtml(data.explanation);

                contentArea.innerHTML = `
                    <div class="p-3 bg-body-tertiary rounded border border-success text-start">
                        <h6 class="fw-bold text-success"><i class="bi bi-check-circle me-2"></i>Analysis Complete</h6>
                        <p class="text-body-secondary mb-3" style="font-size: 0.95em;">${safeExplanation}</p>

                        <h6 class="fw-bold"><i class="bi bi-code-slash me-2"></i>Suggested Fix</h6>
                        <div class="terminal-window">
                            <div class="terminal-header">
                                <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                                <span class="title">secure_code.patch</span>
                            </div>
                            <pre class="terminal-body"><code>${safeFixedCode}</code></pre>
                        </div>
                    </div>
                `;
            } else {
                btn.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Failed. Try Again.';
                btn.classList.replace('btn-outline-primary', 'btn-outline-danger');
                btn.disabled = false;
            }
        } catch (error) {
            btn.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Error. Try Again.';
            btn.disabled = false;
        }
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    document.addEventListener('DOMContentLoaded', function () {
        const scanId = {{ scan.id }};
        const eventSource = new EventSource(`/stream/${scanId}`);

        const statusBadge = document.getElementById('scan-status-badge');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const progressMessage = document.getElementById('progress-message');
        const accordion = document.getElementById('vulnerabilities-accordion');
        const loadingState = document.getElementById('loading-state');
        const noVulnsFoundMessage = document.getElementById('no-vulns-found');

        let vulnerabilityCount = 0;

        // [MỚI] Object lưu trữ các Nhóm Lớn
        const vulnGroups = {};

        // Hàm tính toán điểm severity để so sánh
        const sevScore = { 'critical': 4, 'high': 3, 'medium': 2, 'low': 1, 'info': 0, 'unknown': 0 };

        function updateStatusBadge(status) {
            statusBadge.textContent = status;
            statusBadge.className = 'badge';
            if (status === 'COMPLETED') statusBadge.classList.add('text-bg-success');
            else if (status === 'RUNNING') statusBadge.classList.add('text-bg-info');
            else if (status === 'PENDING') statusBadge.classList.add('text-bg-secondary');
            else if (status === 'FAILED') statusBadge.classList.add('text-bg-danger');
        }

        function getSeverityBadgeClass(severity) {
            switch (severity.toLowerCase()) {
                case 'critical': return 'text-bg-danger';
                case 'high': return 'text-bg-danger';
                case 'medium': return 'text-bg-warning text-dark';
                case 'low': return 'text-bg-primary';
                default: return 'text-bg-secondary';
            }
        }

        // [MỚI] Hàm phân loại lỗ hổng thành Nhóm Lớn
        function getGroupName(vulnType) {
            const t = vulnType.toLowerCase();
            if (t.includes('ssl') || t.includes('tls') || t.includes('cipher') || t.includes('certificate'))
                return 'SSL/TLS Configuration Issues';
            if (t.includes('header') || t.includes('hsts') || t.includes('clickjacking') || t.includes('content-security-policy'))
                return 'Missing Security Headers';
            if (t.includes('outdated') || t.includes('known vulnerabilities'))
                return 'Vulnerable or Outdated Components';
            if (t.includes('directory listing'))
                return 'Directory Listing Enabled';
            if (t.includes('cookie'))
                return 'Insecure Cookie Configuration';

            // Mặc định: Nếu không khớp luật gộp nào, lấy chính tên lỗi làm tên nhóm
            // Bỏ tiền tố [Nuclei] nếu có để nhóm dễ hơn
            return vulnType.replace(/\[Nuclei\]\s*/i, '').trim();
        }

        // [MỚI] Xử lý từng lỗ hổng và gom nhóm
        function processVulnerability(vuln) {
            vulnerabilityCount++;
            loadingState.classList.add('d-none');

            const groupName = getGroupName(vuln.type);
            // Tạo ID an toàn cho DOM từ tên nhóm
            const groupId = 'grp-' + btoa(unescape(encodeURIComponent(groupName))).replace(/[^a-zA-Z0-9]/g, '').substring(0, 20);

            // 1. NẾU NHÓM CHƯA TỒN TẠI -> TẠO GIAO DIỆN NHÓM LỚN (PARENT)
            if (!vulnGroups[groupId]) {
                vulnGroups[groupId] = {
                    name: groupName,
                    maxSeverity: vuln.severity,
                    count: 0,
                    firstVulnId: vuln.id // Lưu ID đầu tiên để gửi cho AI
                };

                const aiTabNav = `
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="ai-tab-btn-${groupId}" data-bs-toggle="tab" data-bs-target="#ai-tab-${groupId}" type="button" role="tab">
                            <i class="bi bi-stars text-warning me-1"></i>AI Remediation
                        </button>
                    </li>`;

                const aiTabContent = `
                    <div class="tab-pane fade" id="ai-tab-${groupId}" role="tabpanel">
                        <div class="mt-4 text-center" id="ai-content-${groupId}">
                            <p class="text-muted mb-3"><i class="bi bi-magic fs-4 d-block mb-2"></i> Use DeepSeek AI to analyze this class of vulnerabilities and generate a general fix strategy.</p>
                            <button id="btn-ai-${groupId}" class="btn btn-outline-primary" onclick="triggerAiRemediation('${groupId}', ${vuln.id})">
                                <i class="bi bi-cpu"></i> Generate AI Fix for Group
                            </button>
                        </div>
                    </div>`;

                const parentHtml = `
                    <div class="accordion-item border border-2 mb-3 rounded" id="parent-${groupId}">
                        <h2 class="accordion-header" id="heading-${groupId}">
                            <button class="accordion-button collapsed bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${groupId}">
                                <span class="badge ${getSeverityBadgeClass(vuln.severity)} me-2" id="badge-sev-${groupId}">${vuln.severity}</span>
                                <span class="fw-bold me-2" style="font-size: 1.1em;">${groupName}</span>
                                <span class="badge rounded-pill text-bg-secondary ms-auto" id="badge-count-${groupId}">1 issue</span>
                            </button>
                        </h2>
                        <div id="collapse-${groupId}" class="accordion-collapse collapse" data-bs-parent="#vulnerabilities-accordion">
                            <div class="accordion-body">
                                <ul class="nav nav-tabs" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active" id="details-tab-${groupId}" data-bs-toggle="tab" data-bs-target="#details-pane-${groupId}" type="button" role="tab">Instances Details</button>
                                    </li>
                                    ${aiTabNav}
                                </ul>
                                <div class="tab-content pt-3">
                                    <div class="tab-pane fade show active" id="details-pane-${groupId}" role="tabpanel">
                                        <!-- Các nhánh nhỏ (children) sẽ được nhét vào đây -->
                                        <div class="list-group" id="children-list-${groupId}">
                                        </div>
                                    </div>
                                    ${aiTabContent}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                accordion.insertAdjacentHTML('beforeend', parentHtml);
            }

            // 2. CẬP NHẬT TRẠNG THÁI NHÓM LỚN (Count & Max Severity)
            const group = vulnGroups[groupId];
            group.count++;
            document.getElementById(`badge-count-${groupId}`).innerText = `${group.count} issues`;

            if (sevScore[vuln.severity.toLowerCase()] > sevScore[group.maxSeverity.toLowerCase()]) {
                group.maxSeverity = vuln.severity;
                const badgeEl = document.getElementById(`badge-sev-${groupId}`);
                badgeEl.innerText = vuln.severity;
                badgeEl.className = `badge ${getSeverityBadgeClass(vuln.severity)} me-2`;
            }

            // 3. TẠO VÀ CHÈN NHÁNH NHỎ (CHILD INSTANCE) VÀO TRONG NHÓM LỚN
            let details = vuln.details;
            if (typeof details === 'string') {
                try { details = JSON.parse(details); } catch (e) { details = {}; }
            }

            let detailsHtml = '<ul class="list-unstyled mb-0 ms-3 mt-2 border-start border-2 ps-3">';
            if (typeof details === 'object' && details !== null) {
                for (const [key, value] of Object.entries(details)) {
                    if (key === 'ai_suggestion') continue; // AI dời ra tab lớn rồi
                    let displayValue = typeof value === 'object' ? JSON.stringify(value, null, 2) : value;
                    displayValue = escapeHtml(displayValue);
                    detailsHtml += `<li class="small mb-1"><strong class="text-secondary">${key}:</strong> <code class="text-break bg-light px-1 rounded">${displayValue}</code></li>`;
                }
            } else {
                 detailsHtml += `<li class="small"><code>${escapeHtml(details)}</code></li>`;
            }
            detailsHtml += '</ul>';

            let cweBadge = vuln.cwe && vuln.cwe !== 'N/A' ? `<span class="badge text-bg-secondary ms-2" style="font-size: 0.7em;">${vuln.cwe.split(':')[0]}</span>` : '';

            const childHtml = `
                <div class="list-group-item list-group-item-action flex-column align-items-start border-0 border-bottom mb-2 pb-3">
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <h6 class="mb-1 fw-bold text-dark">
                            <span class="badge ${getSeverityBadgeClass(vuln.severity)} me-1" style="font-size: 0.7em;">${vuln.severity}</span>
                            ${vuln.type.replace(/\[Nuclei\]\s*/i, '')} ${cweBadge}
                        </h6>
                    </div>
                    <p class="mb-1 small">
                        <strong>URL:</strong> <a href="${vuln.url}" target="_blank" class="text-decoration-none text-break">${vuln.url}</a>
                    </p>
                    ${vuln.subcategory ? `<p class="mb-1 small"><strong>Subcategory:</strong> ${vuln.subcategory}</p>` : ''}
                    <div class="mt-2">
                        ${detailsHtml}
                    </div>
                </div>
            `;

            document.getElementById(`children-list-${groupId}`).insertAdjacentHTML('beforeend', childHtml);
        }

        eventSource.onmessage = function (event) {
            const data = JSON.parse(event.data);

            updateStatusBadge(data.status);
            progressMessage.textContent = data.progress_message || '...';

            if(data.new_vulnerabilities) {
                // Gọi hàm process mới
                data.new_vulnerabilities.forEach(processVulnerability);
            }

            // Phần AI Tổng quan (Giữ nguyên)
            if (data.ai_analysis) {
                const aiSec = document.getElementById('ai-summary-section');
                const analysis = data.ai_analysis;
                aiSec.classList.remove('d-none');
                document.getElementById('ai-risk-score').innerText = analysis.risk_score || 'N/A';
                document.getElementById('ai-exec-summary').innerText = analysis.executive_summary || 'No summary available.';
                document.getElementById('ai-strategy').innerText = analysis.strategic_recommendations || 'No strategy provided.';
                const priorityList = document.getElementById('ai-priorities');
                priorityList.innerHTML = '';
                if (analysis.top_priorities && Array.isArray(analysis.top_priorities)) {
                    analysis.top_priorities.forEach(item => {
                        priorityList.innerHTML += `<li class="mb-2"><i class="bi bi-caret-right-fill text-warning me-2"></i>${item}</li>`;
                    });
                }
            }

            if (data.status === 'RUNNING') {
                progressBar.style.width = '50%';
                progressBar.classList.add('progress-bar-animated');
                loadingState.classList.remove('d-none');
            } else if (data.status === 'COMPLETED' || data.status === 'FAILED') {
                progressBar.style.width = '100%';
                progressBar.classList.remove('progress-bar-animated');
                progressContainer.setAttribute('aria-valuenow', 100);

                if (data.status === 'COMPLETED') {
                    progressBar.classList.remove('bg-info');
                    progressBar.classList.add('bg-success');
                    progressMessage.textContent = `Scan finished at ${data.end_time}. Found ${vulnerabilityCount} app vulnerabilities.`;
                    if (vulnerabilityCount === 0) {
                        loadingState.classList.add('d-none');
                        noVulnsFoundMessage.classList.remove('d-none');
                    }
                } else {
                     progressBar.classList.remove('bg-info');
                     progressBar.classList.add('bg-danger');
                     progressMessage.textContent = `Scan failed at ${data.end_time}. Check logs for details.`;
                }

                eventSource.close();
            }
        };

        eventSource.onerror = function(err) {
            console.error("EventSource failed:", err);
            updateStatusBadge('ERROR');
            progressMessage.textContent = 'Connection to server lost. Please refresh.';
            eventSource.close();
        };

        updateStatusBadge('{{ scan.status }}');
    });
</script>
{% endblock %}
